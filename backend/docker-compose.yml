services:
  mysql:
    image: mysql:8.0
    container_name: snippetvault-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: snippetvault
      MYSQL_USER: snippetvault
      MYSQL_PASSWORD: snippetvault
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "snippetvault", "-psnippetvault"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: snippetvault-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_HOST: mysql
      DB_USER: snippetvault
      DB_PASSWORD: snippetvault
      DB_NAME: snippetvault
    ports:
      - "8080:5000"

volumes:
  mysql-data:
